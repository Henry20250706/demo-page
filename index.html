<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My First Webpage</title>
    <style>
        /* This is the CSS section where we design the page */
        
        body {
            background-color: #f0f4f8; /* A soft light-blue background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Cleaner fonts */
            color: #333; /* Dark grey text for easier reading */
            line-height: 1.6; /* Adds space between lines of text */
            padding: 40px;
            max-width: 800px;
            margin: 0 auto; /* Centers the content on the screen */
        }

        h1 {
            color: #2c3e50; /* A deep navy blue for the heading */
            border-bottom: 2px solid #3498db; /* Adds a stylish underline */
            padding-bottom: 10px;
        }

        p {
            background-color: white;
            padding: 20px;
            border-radius: 8px; /* Rounds the corners of the box */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* Adds a subtle shadow */
        }
        .main-image {
    max-width: 25%;    /* Ensures it never overflows the screen */
    height: auto;       /* Keeps the proportions correct so it doesn't look squished */
    display: block;     /* Helps with centering */
    margin: 20px auto;  /* Adds space and centers it */
    border-radius: 12px; /* Matches your paragraph styling */
}
    </style>
</head>
<body>

    <h1>Welcome to Our Intro to AI Class</h1>

    <img src="regencygirl123-landscape-10205701.jpg" alt="This is an image" class="main-image">
    
    <p>This is my very first website! In this class, we are learning how to use GitHub to host projects and share our work with the world.</p>
    
    <p>Update: I just learned how to edit my code and add custom CSS styling!</p>

</body>
</html>
